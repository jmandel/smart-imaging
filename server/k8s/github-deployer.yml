apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-deployer
  namespace: smart-imaging-access
---
apiVersion: v1
kind: Secret
metadata:
  name: github-deployer-token
  namespace: smart-imaging-access
  annotations:
    kubernetes.io/service-account.name: github-deployer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-deployer
  namespace: smart-imaging-access
rules:
- apiGroups:
  - apps
  resources:
  - deployments
  resourceNames:
  - reference
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-deployer
  namespace: smart-imaging-access
subjects:
- kind: ServiceAccount
  name: github-deployer
  namespace: smart-imaging-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-deployer
